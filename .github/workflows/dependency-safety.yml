name: Dependency Safety

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Clean install
        run: npm run security:install

      - name: Lockfile lint
        run: npm run security:lockfile

      - name: Audit
        run: npm run audit:security
